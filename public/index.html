<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>quantara — paste a product URL</title>
    <style>
      :root {
        --bg: #0e0f12;
        --panel: #16181d;
        --border: #2a2d34;
        --text: #e8e8ea;
        --muted: #9aa0a8;
        --accent: #4f8cff;
        --error: #ff6b6b;
        --warn: #f5b54a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
      h1 { margin: 0; font-size: 18px; font-weight: 600; }
      .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
      main { padding: 24px; max-width: 1100px; margin: 0 auto; }
      .row { display: flex; gap: 8px; align-items: stretch; }
      input[type="url"] {
        flex: 1; padding: 10px 12px;
        background: var(--panel); color: var(--text);
        border: 1px solid var(--border); border-radius: 6px; font-size: 14px;
      }
      input[type="url"]:focus { outline: none; border-color: var(--accent); }
      button {
        padding: 10px 16px; border-radius: 6px;
        border: 1px solid var(--border); background: var(--panel);
        color: var(--text); font-size: 14px; cursor: pointer;
      }
      button.primary { background: var(--accent); border-color: var(--accent); color: white; }
      button.danger { color: var(--error); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .status { margin-top: 12px; color: var(--muted); font-size: 13px; }
      .status.error { color: var(--error); }
      .status.warn { color: var(--warn); }
      .panel {
        margin-top: 24px; background: var(--panel);
        border: 1px solid var(--border); border-radius: 8px; padding: 16px;
      }
      .panel h2 {
        margin: 0 0 12px; font-size: 13px; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted);
        display: flex; justify-content: space-between; align-items: baseline;
      }
      .panel h2 .count { font-weight: 400; color: var(--muted); }
      pre {
        margin: 0; max-height: 320px; overflow: auto;
        white-space: pre-wrap; word-break: break-word;
        font: 12px/1.5 ui-monospace, Menlo, Consolas, monospace;
        color: var(--text);
      }
      .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
      .hidden { display: none; }
      ul.products { list-style: none; padding: 0; margin: 0; }
      ul.products li {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 12px; align-items: baseline;
        padding: 8px 0; border-bottom: 1px solid var(--border);
      }
      ul.products li:last-child { border-bottom: none; }
      .pname { color: var(--text); }
      .pname .meta { color: var(--muted); font-size: 12px; }
      .pname a { color: var(--accent); text-decoration: none; }
      .pname a:hover { text-decoration: underline; }
      .mode {
        font-size: 11px; padding: 2px 6px; border-radius: 4px;
        background: #20232a; color: var(--muted);
      }
      .mode.text { color: #6dd58a; }
      .mode.vision { color: var(--warn); }
      .mode.hybrid { color: var(--accent); }
      .remove {
        background: transparent; border: none; color: var(--muted);
        padding: 2px 6px; cursor: pointer; font-size: 13px;
      }
      .remove:hover { color: var(--error); }
      .empty { color: var(--muted); padding: 8px 0; }
      details.bulk {
        margin-top: 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 4px 12px;
      }
      details.bulk[open] { padding-bottom: 12px; }
      details.bulk summary {
        cursor: pointer;
        padding: 8px 0;
        color: var(--muted);
        font-size: 13px;
      }
      details.bulk summary:hover { color: var(--text); }
      .bulk-body { display: grid; gap: 8px; }
      .bulk-body textarea {
        min-height: 100px;
        padding: 8px 10px;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        font: 12px/1.5 ui-monospace, Menlo, Consolas, monospace;
        resize: vertical;
      }
      .bulk-body textarea:focus { outline: none; border-color: var(--accent); }
      .bulk-body input[type="file"] { color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <h1>quantara</h1>
      <div class="sub">
        Paste a product URL. Each extraction adds to the list. Download once
        when you're done — every product lands in the same workbook.
      </div>
    </header>

    <main>
      <form id="form" class="row" autocomplete="off">
        <input
          id="url"
          type="url"
          placeholder="https://www.example.com/products/widget"
          required
        />
        <button class="primary" id="submit" type="submit">Extract</button>
      </form>

      <details class="bulk">
        <summary>Bulk import URLs (paste a list or upload CSV)</summary>
        <div class="bulk-body">
          <input id="csvFile" type="file" accept=".csv,.txt,text/csv,text/plain" />
          <textarea
            id="urlsText"
            placeholder="One URL per line, or paste CSV — the first column is read as the URL.

https://www.example.com/products/widget-a
https://www.example.com/products/widget-b"
          ></textarea>
          <div class="row">
            <button id="bulkImport" type="button">Import URLs</button>
            <span id="bulkPreview" class="status" style="margin: 0; align-self: center;"></span>
          </div>
        </div>
      </details>

      <div id="status" class="status"></div>

      <section id="latest" class="panel hidden">
        <h2>Most recent extraction</h2>
        <pre id="json"></pre>
      </section>

      <section id="batch" class="panel">
        <h2>
          <span>Batch</span>
          <span class="count" id="count">0 products</span>
        </h2>
        <ul id="list" class="products"></ul>
        <div class="actions">
          <button id="download" class="primary" disabled>Download .xlsx</button>
          <button id="clear" class="danger" disabled>Clear all</button>
        </div>
      </section>
    </main>

    <script>
      const STORAGE_KEY = 'quantara.batch.v1';
      const $ = (id) => document.getElementById(id);

      const form = $('form');
      const urlInput = $('url');
      const submit = $('submit');
      const status = $('status');
      const latest = $('latest');
      const jsonOut = $('json');
      const listEl = $('list');
      const countEl = $('count');
      const downloadBtn = $('download');
      const clearBtn = $('clear');
      const csvFile = $('csvFile');
      const urlsText = $('urlsText');
      const bulkImport = $('bulkImport');
      const bulkPreview = $('bulkPreview');

      const BULK_CONCURRENCY = 2;

      function loadBatch() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch {
          return [];
        }
      }
      function saveBatch(items) {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
        } catch {
          // localStorage may be unavailable / full — silently fall back to
          // in-memory only. The batch still works for the current session.
        }
      }

      let batch = loadBatch();

      function setStatus(msg, kind) {
        status.textContent = msg;
        status.classList.remove('error', 'warn');
        if (kind === 'error') status.classList.add('error');
        else if (kind === 'warn') status.classList.add('warn');
      }

      function renderBatch() {
        listEl.innerHTML = '';
        countEl.textContent =
          batch.length === 1 ? '1 product' : batch.length + ' products';
        downloadBtn.disabled = batch.length === 0;
        clearBtn.disabled = batch.length === 0;

        if (batch.length === 0) {
          const li = document.createElement('li');
          li.className = 'empty';
          li.textContent = 'No products yet. Paste a URL above to start.';
          listEl.appendChild(li);
          return;
        }

        batch.forEach((p, i) => {
          const li = document.createElement('li');

          const name = document.createElement('div');
          name.className = 'pname';
          const title = document.createElement('div');
          title.textContent = p.title || '(untitled)';
          const meta = document.createElement('div');
          meta.className = 'meta';
          const sku = p.sku ? p.sku + ' — ' : '';
          const a = document.createElement('a');
          a.href = p.sourceUrl || '#';
          a.target = '_blank';
          a.rel = 'noopener';
          a.textContent = p.sourceUrl || '';
          meta.append(sku);
          meta.append(a);
          name.append(title, meta);

          const mode = document.createElement('span');
          const m = (p.extractionMode || '').split('-')[0];
          mode.className = 'mode ' + (m || '');
          mode.textContent = p.extractionMode || '';

          const rm = document.createElement('button');
          rm.className = 'remove';
          rm.title = 'Remove from batch';
          rm.textContent = '✕';
          rm.addEventListener('click', () => {
            batch.splice(i, 1);
            saveBatch(batch);
            renderBatch();
          });

          li.append(name, mode, rm);
          listEl.appendChild(li);
        });
      }

      // Single extract — used by both the form and bulk import.
      // Returns { ok: true, product } | { ok: false, error }.
      async function extractOne(url) {
        try {
          const r = await fetch('/api/extract', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
          });
          const data = await r.json();
          if (!r.ok) return { ok: false, error: data.error || ('HTTP ' + r.status) };
          batch.push(data.product);
          saveBatch(batch);
          renderBatch();
          return { ok: true, product: data.product };
        } catch (err) {
          return { ok: false, error: err.message };
        }
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const url = urlInput.value.trim();
        if (!url) return;
        submit.disabled = true;
        latest.classList.add('hidden');
        setStatus('Rendering page and asking Claude...');

        const result = await extractOne(url);
        submit.disabled = false;

        if (!result.ok) {
          setStatus(result.error, 'error');
          return;
        }
        jsonOut.textContent = JSON.stringify(result.product, null, 2);
        latest.classList.remove('hidden');
        const mode = result.product.extractionMode || '';
        const note = mode ? ' (mode: ' + mode + ')' : '';
        const kind = mode.indexOf('low-confidence') !== -1 ? 'warn' : null;
        setStatus(
          'Added to batch. ' + batch.length + ' product' +
            (batch.length === 1 ? '' : 's') + ' total.' + note,
          kind
        );
        urlInput.value = '';
        urlInput.focus();
      });

      // ---- Bulk import --------------------------------------------------
      // Accepts a textarea or a file. Parses URLs (one per line; if a line
      // looks like a CSV row, the URL is in the first field). Then runs a
      // small concurrency-limited queue so we don't hammer the server.

      function parseUrlsFromText(text) {
        if (!text) return [];
        const lines = text.split(/\r?\n/);
        const urls = [];
        const seen = new Set();
        for (const line of lines) {
          // Strip BOM, take first comma-separated field, trim quotes.
          const first = line.replace(/^﻿/, '').split(',')[0].trim().replace(/^"|"$/g, '');
          if (!first) continue;
          if (/^url$/i.test(first)) continue; // header row
          let parsed;
          try { parsed = new URL(first); } catch { continue; }
          if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') continue;
          const normalized = parsed.toString();
          if (seen.has(normalized)) continue;
          seen.add(normalized);
          urls.push(normalized);
        }
        return urls;
      }

      function updateBulkPreview() {
        const urls = parseUrlsFromText(urlsText.value);
        bulkPreview.textContent = urls.length
          ? urls.length + ' URL' + (urls.length === 1 ? '' : 's') + ' detected'
          : '';
      }
      urlsText.addEventListener('input', updateBulkPreview);

      csvFile.addEventListener('change', async () => {
        const file = csvFile.files && csvFile.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          urlsText.value = text;
          updateBulkPreview();
        } catch (err) {
          setStatus('Could not read file: ' + err.message, 'error');
        }
      });

      async function runQueue(urls, concurrency, onProgress) {
        const results = { ok: 0, failed: 0, errors: [] };
        let nextIndex = 0;
        async function worker() {
          while (true) {
            const i = nextIndex++;
            if (i >= urls.length) return;
            const url = urls[i];
            const r = await extractOne(url);
            if (r.ok) results.ok++;
            else {
              results.failed++;
              results.errors.push({ url, error: r.error });
            }
            onProgress(results.ok + results.failed, urls.length, url);
          }
        }
        const workers = [];
        for (let i = 0; i < Math.min(concurrency, urls.length); i++) {
          workers.push(worker());
        }
        await Promise.all(workers);
        return results;
      }

      bulkImport.addEventListener('click', async () => {
        const urls = parseUrlsFromText(urlsText.value);
        if (urls.length === 0) {
          setStatus('No valid URLs detected in the input.', 'error');
          return;
        }
        bulkImport.disabled = true;
        submit.disabled = true;
        latest.classList.add('hidden');
        setStatus('Importing ' + urls.length + ' URL(s)... 0/' + urls.length);

        const results = await runQueue(urls, BULK_CONCURRENCY, (done, total) => {
          setStatus('Importing... ' + done + '/' + total);
        });

        bulkImport.disabled = false;
        submit.disabled = false;

        const summary =
          'Bulk import done: ' + results.ok + ' added, ' + results.failed + ' failed.';
        if (results.failed > 0) {
          console.warn('Bulk import errors:', results.errors);
          setStatus(summary + ' (See console for failed URLs.)', 'warn');
        } else {
          setStatus(summary);
          urlsText.value = '';
          updateBulkPreview();
        }
      });

      downloadBtn.addEventListener('click', async () => {
        if (batch.length === 0) return;
        downloadBtn.disabled = true;
        setStatus('Building workbook with ' + batch.length + ' product(s)...');
        try {
          const r = await fetch('/api/workbook', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ products: batch }),
          });
          if (!r.ok) {
            const data = await r.json().catch(() => ({}));
            throw new Error(data.error || ('HTTP ' + r.status));
          }
          const blob = await r.blob();
          const cd = r.headers.get('Content-Disposition') || '';
          const m = cd.match(/filename="([^"]+)"/);
          const filename = m ? m[1] : 'quantara.xlsx';
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          a.click();
          URL.revokeObjectURL(a.href);
          setStatus('Downloaded ' + filename + '.');
        } catch (err) {
          setStatus(err.message, 'error');
        } finally {
          downloadBtn.disabled = batch.length === 0;
        }
      });

      clearBtn.addEventListener('click', () => {
        if (batch.length === 0) return;
        if (!confirm('Clear all ' + batch.length + ' product(s) from the batch?')) {
          return;
        }
        batch = [];
        saveBatch(batch);
        latest.classList.add('hidden');
        renderBatch();
        setStatus('Batch cleared.');
      });

      renderBatch();
    </script>
  </body>
</html>
