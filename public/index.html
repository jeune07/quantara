<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>quantara — paste a product URL</title>
    <style>
      :root {
        --bg: #0e0f12;
        --panel: #16181d;
        --border: #2a2d34;
        --text: #e8e8ea;
        --muted: #9aa0a8;
        --accent: #4f8cff;
        --error: #ff6b6b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      header {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
      }
      h1 { margin: 0; font-size: 18px; font-weight: 600; }
      .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
      main { padding: 24px; max-width: 1100px; margin: 0 auto; }
      .row { display: flex; gap: 8px; align-items: stretch; }
      input[type="url"] {
        flex: 1;
        padding: 10px 12px;
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 14px;
      }
      input[type="url"]:focus {
        outline: none;
        border-color: var(--accent);
      }
      button {
        padding: 10px 16px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        font-size: 14px;
        cursor: pointer;
      }
      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: white;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .status { margin-top: 12px; color: var(--muted); font-size: 13px; }
      .status.error { color: var(--error); }
      .panel {
        margin-top: 24px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
      }
      .panel h2 {
        margin: 0 0 12px;
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font: 12px/1.5 ui-monospace, Menlo, Consolas, monospace;
        color: var(--text);
      }
      .actions { margin-top: 12px; display: flex; gap: 8px; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <header>
      <h1>quantara</h1>
      <div class="sub">
        Paste a product URL. Claude reads the page and returns structured data.
      </div>
    </header>
    <main>
      <form id="form" class="row" autocomplete="off">
        <input
          id="url"
          type="url"
          placeholder="https://www.example.com/products/widget"
          required
        />
        <button class="primary" id="submit" type="submit">Extract</button>
      </form>
      <div id="status" class="status"></div>

      <div id="result" class="panel hidden">
        <h2>Result</h2>
        <pre id="json"></pre>
        <div class="actions">
          <button id="download">Download .xlsx</button>
        </div>
      </div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const form = $('form');
      const urlInput = $('url');
      const submit = $('submit');
      const status = $('status');
      const result = $('result');
      const jsonOut = $('json');
      const download = $('download');

      function setStatus(msg, isError) {
        status.textContent = msg;
        status.classList.toggle('error', !!isError);
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const url = urlInput.value.trim();
        if (!url) return;
        submit.disabled = true;
        result.classList.add('hidden');
        setStatus('Rendering page and asking Claude...');
        try {
          const r = await fetch('/api/extract', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
          });
          const data = await r.json();
          if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
          jsonOut.textContent = JSON.stringify(data.product, null, 2);
          result.classList.remove('hidden');
          const mode = data.product && data.product.extractionMode;
          setStatus('Done.' + (mode ? ' (mode: ' + mode + ')' : ''));
        } catch (err) {
          setStatus(err.message, true);
        } finally {
          submit.disabled = false;
        }
      });

      download.addEventListener('click', async () => {
        const url = urlInput.value.trim();
        if (!url) return;
        download.disabled = true;
        setStatus('Building workbook...');
        try {
          const r = await fetch('/api/extract.xlsx', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
          });
          if (!r.ok) {
            const data = await r.json().catch(() => ({}));
            throw new Error(data.error || `HTTP ${r.status}`);
          }
          const blob = await r.blob();
          const cd = r.headers.get('Content-Disposition') || '';
          const m = cd.match(/filename="([^"]+)"/);
          const filename = m ? m[1] : 'product.xlsx';
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = filename;
          a.click();
          URL.revokeObjectURL(a.href);
          setStatus('Downloaded ' + filename + '.');
        } catch (err) {
          setStatus(err.message, true);
        } finally {
          download.disabled = false;
        }
      });
    </script>
  </body>
</html>
